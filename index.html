<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OreoPie — Secure P2P File Transfer</title>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<style>
  :root{
    --bg:#070a10;
    --panel:#0d121b;
    --panel-2:#121927;
    --line:#1c2536;
    --cyan:#00e5ff;
    --violet:#8b6bff;
    --green:#00ffa3;
    --red:#ff4d6d;
    --text:#e7ecf5;
    --muted:#6d7791;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Space Grotesk', 'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,107,255,.15), transparent),
      radial-gradient(ellipse 60% 40% at 90% 90%, rgba(0,229,255,.08), transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    overflow-x:hidden;
  }
  @font-face{
    /* fallback stack already covers this; system fonts used if CDN blocked */
  }
  .bg-grid{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(139,107,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139,107,255,.04) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, black, transparent);
  }
  #app{position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column;}

  header.topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line);
    backdrop-filter: blur(6px);
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.5px;}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--cyan); box-shadow:0 0 12px var(--cyan);}
  .brand span.tag{font-family:var(--mono); font-size:11px; color:var(--muted); border:1px solid var(--line); padding:2px 8px; border-radius:20px; margin-left:6px;}
  .user-pill{display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:13px; color:var(--muted);}
  .user-pill b{color:var(--text);}
  .btn{
    font-family:var(--sans); font-weight:600; font-size:14px;
    padding:10px 18px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel-2); color:var(--text); cursor:pointer;
    transition:.15s ease; letter-spacing:.2px;
  }
  .btn:hover{border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan) inset;}
  .btn.primary{background:linear-gradient(135deg,var(--cyan),var(--violet)); color:#04060a; border:none;}
  .btn.primary:hover{filter:brightness(1.08);}
  .btn.ghost{background:transparent;}
  .btn.danger{border-color:var(--red); color:var(--red);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  main{flex:1; display:flex; align-items:center; justify-content:center; padding:24px;}
  .center-col{width:100%; max-width:420px;}

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:18px;
    padding:32px; box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .card h1{font-size:22px; margin-bottom:6px;}
  .card p.sub{color:var(--muted); font-size:13px; margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-family:var(--mono); letter-spacing:.5px; text-transform:uppercase;}
  .field input{
    width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
    padding:12px 14px; color:var(--text); font-size:14px; font-family:var(--sans);
    outline:none; transition:.15s;
  }
  .field input:focus{border-color:var(--cyan); box-shadow:0 0 0 3px rgba(0,229,255,.12);}
  .switch-link{text-align:center; margin-top:16px; font-size:13px; color:var(--muted);}
  .switch-link a{color:var(--cyan); cursor:pointer; text-decoration:none;}
  .err{color:var(--red); font-size:13px; margin-top:10px; font-family:var(--mono);}

  /* Mode choice */
  .mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  .mode-card{
    background:var(--panel-2); border:1px solid var(--line); border-radius:16px; padding:22px;
    cursor:pointer; transition:.15s; text-align:left;
  }
  .mode-card:hover{border-color:var(--violet); transform:translateY(-2px);}
  .mode-card .icon{width:36px;height:36px;border-radius:10px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; font-size:18px;}
  .mode-card.a .icon{background:rgba(0,229,255,.12); color:var(--cyan);}
  .mode-card.b .icon{background:rgba(139,107,255,.12); color:var(--violet);}
  .mode-card h3{font-size:16px; margin-bottom:4px;}
  .mode-card p{font-size:12.5px; color:var(--muted); line-height:1.4;}

  /* Pairing */
  .code-boxes{display:flex; gap:8px; justify-content:center; margin:18px 0;}
  .code-boxes input{
    width:44px; height:54px; text-align:center; font-size:22px; font-family:var(--mono);
    background:var(--panel-2); border:1px solid var(--line); border-radius:10px; color:var(--cyan);
  }
  .code-boxes input:focus{border-color:var(--cyan); outline:none; box-shadow:0 0 0 3px rgba(0,229,255,.12);}
  .code-display{
    font-family:var(--mono); font-size:34px; letter-spacing:10px; text-align:center;
    color:var(--cyan); background:var(--panel-2); border:1px solid var(--line); border-radius:14px;
    padding:22px 0; margin:18px 0; text-shadow:0 0 20px rgba(0,229,255,.4);
  }
  .hint{font-size:12px; color:var(--muted); text-align:center;}

  /* Dashboard */
  .dash{display:grid; grid-template-columns:340px 1fr; gap:0; flex:1; width:100%; height:calc(100vh - 65px);}
  .side{border-right:1px solid var(--line); padding:20px; overflow-y:auto;}
  .side h4{font-family:var(--mono); font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;}
  .peer-item{
    display:flex; align-items:center; gap:10px; padding:12px; border:1px solid var(--line);
    border-radius:12px; margin-bottom:10px; background:var(--panel);
    cursor:pointer; transition:.15s;
  }
  .peer-item:hover{border-color:var(--cyan);}
  .peer-item.active{border-color:var(--violet); box-shadow:0 0 0 1px var(--violet) inset;}
  .peer-avatar{width:34px;height:34px;border-radius:9px; background:linear-gradient(135deg,var(--cyan),var(--violet)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#04060a;}
  .peer-meta{flex:1; min-width:0;}
  .peer-meta .pname{font-size:13.5px; font-weight:600;}
  .peer-meta .pstatus{font-size:11px; color:var(--muted); font-family:var(--mono);}
  .peer-meta .pstatus.connected{color:var(--green);}
  .peer-meta .pstatus.connecting{color:#ffcc66;}

  .canvas-wrap{position:relative; border-bottom:1px solid var(--line); background:radial-gradient(ellipse 60% 80% at 50% 50%, rgba(139,107,255,.06), transparent);}
  #graph{display:block; width:100%; height:220px;}

  .work{display:flex; flex-direction:column; overflow:hidden;}
  .drop-zone{
    margin:20px; border:2px dashed var(--line); border-radius:16px; padding:34px; text-align:center;
    color:var(--muted); cursor:pointer; transition:.15s;
  }
  .drop-zone.over{border-color:var(--cyan); background:rgba(0,229,255,.05); color:var(--cyan);}
  .drop-zone .big{font-size:14px; margin-bottom:4px; color:var(--text);}
  .drop-zone .small{font-size:12px;}

  .tabs{display:flex; gap:4px; margin:0 20px 12px; border-bottom:1px solid var(--line);}
  .tab{padding:10px 16px; font-size:13px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent;}
  .tab.active{color:var(--cyan); border-color:var(--cyan);}

  .panel-body{flex:1; overflow-y:auto; padding:0 20px 20px;}

  .file-row{
    display:flex; align-items:center; gap:12px; padding:10px; border:1px solid var(--line);
    border-radius:10px; margin-bottom:8px; background:var(--panel);
  }
  .file-thumb{width:38px;height:38px;border-radius:8px; background:var(--panel-2); display:flex; align-items:center; justify-content:center; font-size:16px; overflow:hidden; flex-shrink:0;}
  .file-thumb img{width:100%; height:100%; object-fit:cover;}
  .file-info{flex:1; min-width:0;}
  .file-info .fname{font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .file-info .fmeta{font-size:11px; color:var(--muted); font-family:var(--mono);}
  .progress-bar{height:4px; background:var(--panel-2); border-radius:4px; overflow:hidden; margin-top:6px;}
  .progress-bar .fill{height:100%; background:linear-gradient(90deg,var(--cyan),var(--violet)); width:0%; transition:width .15s;}

  .empty-state{text-align:center; color:var(--muted); padding:60px 20px; font-size:13px;}

  .toast-wrap{position:fixed; bottom:20px; right:20px; z-index:50; display:flex; flex-direction:column; gap:10px;}
  .toast{
    background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 18px;
    min-width:280px; box-shadow:0 10px 30px rgba(0,0,0,.4); animation:slideIn .2s ease;
  }
  .toast .t-title{font-size:13px; font-weight:700; margin-bottom:4px;}
  .toast .t-body{font-size:12px; color:var(--muted); margin-bottom:10px;}
  .toast .t-actions{display:flex; gap:8px;}
  .toast .t-actions .btn{padding:6px 12px; font-size:12px;}
  @keyframes slideIn{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}

  .hidden{display:none !important;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<script type="module">
/* ============================================================
   OreoPie — P2P encrypted file transfer over WebRTC
   Signaling: Supabase Realtime (broadcast channel keyed by code)
   Auth: Supabase table (demo — hash password client-side, no email)
   ============================================================ */

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// -------- CONFIG: fill these after creating a free Supabase project --------
const SUPABASE_URL = 'https://azggwkbzlihmquzpvdmf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_nit6Giy4-k4zOjVg0qLS9g_RYjz2CzJ';

// EmailJS (free, no backend) — used only for the "share code via email" button
const EMAILJS_PUBLIC_KEY = 'YQKYZkAIF1B1NoNLg';
const EMAILJS_SERVICE_ID = 'service_cvzlskl'; 
const EMAILJS_TEMPLATE_ID = 'template_a0ytuq6';
// -----------------------------------------------------------------------------

const EMAILJS_CONFIGURED = ![EMAILJS_PUBLIC_KEY, EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID].some(v => !v || v.startsWith('YOUR_'));
if (window.emailjs && EMAILJS_CONFIGURED) window.emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const CHUNK_SIZE = 16 * 1024; // 16KB datachannel chunks

const app = document.getElementById('app');
const toastWrap = document.getElementById('toasts');

function toast(title, body, actions = []) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<div class="t-title">${title}</div><div class="t-body">${body}</div>
    <div class="t-actions">${actions.map((a,i)=>`<button class="btn ${a.cls||''}" data-i="${i}">${a.label}</button>`).join('')}</div>`;
  actions.forEach((a, i) => {
    el.querySelector(`[data-i="${i}"]`).onclick = () => { a.onClick(); el.remove(); };
  });
  toastWrap.appendChild(el);
  if (!actions.length) setTimeout(() => el.remove(), 4500);
}

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}
function randCode() { return Math.floor(100000 + Math.random()*900000).toString(); }
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024**2) return (b/1024).toFixed(1) + ' KB';
  if (b < 1024**3) return (b/1024**2).toFixed(1) + ' MB';
  return (b/1024**3).toFixed(2) + ' GB';
}

// ============================================================
// STATE
// ============================================================
const state = {
  user: null,                 // {id, username}
  peers: new Map(),           // peerId -> {conn, dc, username, status, sharedTree}
  channel: null,              // supabase realtime channel
  roomKey: null,
  sharedHandle: null,         // FileSystemDirectoryHandle user chose to share
  incoming: new Map(),        // transferId -> reassembly buffer state
};

const ICE_SERVERS = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

// ============================================================
// AUTH
// ============================================================
async function signup(username, password) {
  const hash = await sha256(password + username);
  const { data, error } = await supabase.from('oreopie_users')
    .insert({ username, password_hash: hash }).select().single();
  if (error) throw error;
  return { id: data.id, username };
}
async function login(username, password) {
  const hash = await sha256(password + username);
  const { data, error } = await supabase.from('oreopie_users')
    .select('*').eq('username', username).eq('password_hash', hash).single();
  if (error || !data) throw new Error('Invalid username or password');
  return { id: data.id, username };
}
async function searchUsers(q) {
  if (!q || q.length < 2) return [];
  const { data, error } = await supabase.from('oreopie_users')
    .select('username').ilike('username', `%${q}%`).neq('username', state.user.username).limit(6);
  if (error) return [];
  return data.map(d => d.username);
}
async function sendCodeEmail(fromEmail, toEmail, code, hostUsername) {
  if (!window.emailjs) throw new Error('Email service failed to load.');
  if (!EMAILJS_CONFIGURED) throw new Error('EmailJS not configured — set real keys in SETUP.md.');
  return emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    to_email: toEmail,
    from_email: fromEmail,
    code,
    host_username: hostUsername,
  });
}

// ============================================================
// SIGNALING (Supabase Realtime broadcast, room = channel)
// ============================================================
function joinRoom(roomKey, onMessage) {
  const channel = supabase.channel(roomKey, { config: { broadcast: { self: false }, presence: { key: state.user.id } } });
  channel.on('broadcast', { event: 'signal' }, (payload) => onMessage(payload.payload));
  return channel; // caller adds any extra .on() listeners, then subscribes once
}
function sendSignal(channel, msg) {
  channel.send({ type: 'broadcast', event: 'signal', payload: msg });
}

// ============================================================
// WEBRTC PEER MANAGEMENT (mesh, up to 5 devices)
// ============================================================
function createPeerConnection(peerId, username, initiator) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  const entry = { conn: pc, dc: null, username, status: 'connecting', sharedTree: null };
  state.peers.set(peerId, entry);

  pc.onicecandidate = (e) => {
    if (e.candidate) sendSignal(state.channel, { to: peerId, from: state.user.id, type: 'ice', candidate: e.candidate });
  };
  pc.onconnectionstatechange = () => {
    entry.status = pc.connectionState === 'connected' ? 'connected' : pc.connectionState;
    renderPeerList();
    if (pc.connectionState === 'connected') toast('Device linked', `${username} connected securely.`);
  };

  if (initiator) {
    const dc = pc.createDataChannel('oreopie');
    setupDataChannel(peerId, dc);
    pc.onnegotiationneeded = async () => {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendSignal(state.channel, { to: peerId, from: state.user.id, type: 'offer', sdp: offer, username: state.user.username });
    };
  } else {
    pc.ondatachannel = (e) => setupDataChannel(peerId, e.channel);
  }
  return entry;
}

function setupDataChannel(peerId, dc) {
  dc.binaryType = 'arraybuffer';
  const entry = state.peers.get(peerId);
  entry.dc = dc;
  dc.onopen = () => renderPeerList();
  dc.onmessage = (e) => handleIncoming(peerId, e.data);
}

async function handleSignal(msg) {
  if (msg.to !== state.user.id) return;
  const { from, type } = msg;
  let entry = state.peers.get(from);

  if (type === 'offer') {
    if (!entry) entry = createPeerConnection(from, msg.username || from, false);
    await entry.conn.setRemoteDescription(msg.sdp);
    const answer = await entry.conn.createAnswer();
    await entry.conn.setLocalDescription(answer);
    sendSignal(state.channel, { to: from, from: state.user.id, type: 'answer', sdp: answer, username: state.user.username });
  } else if (type === 'answer') {
    await entry.conn.setRemoteDescription(msg.sdp);
  } else if (type === 'ice') {
    if (entry) { try { await entry.conn.addIceCandidate(msg.candidate); } catch {} }
  } else if (type === 'request-access') {
    promptAccessRequest(from, msg.username);
  } else if (type === 'access-granted') {
    toast('Access granted', `${entry.username} shared their files.`);
  } else if (type === 'access-denied') {
    toast('Access denied', `${entry.username} declined the request.`);
  }
}

// New peer joins -> lower-id device initiates connection to avoid glare
function handlePresenceJoin(peerId, username) {
  if (peerId === state.user.id || state.peers.has(peerId)) return;
  const iAmInitiator = state.user.id < peerId;
  createPeerConnection(peerId, username, iAmInitiator);
  if (!document.querySelector('.dash')) render(DashboardView());
  renderPeerList();
}

// ============================================================
// FILE TRANSFER — chunked binary over datachannel
// Protocol: JSON control msg (as string) then raw ArrayBuffer chunks
// ============================================================
async function sendFile(peerId, file) {
  const entry = state.peers.get(peerId);
  if (!entry || !entry.dc || entry.dc.readyState !== 'open') return toast('Not connected', 'Peer datachannel not ready.');
  const transferId = crypto.randomUUID();
  entry.dc.send(JSON.stringify({ kind: 'file-start', transferId, name: file.name, size: file.size, mime: file.type }));

  let offset = 0;
  const reader = file.stream().getReader();
  const rowId = renderTransferRow(peerId, transferId, file.name, file.size, 'out');
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    for (let i = 0; i < value.length; i += CHUNK_SIZE) {
      const chunk = value.slice(i, i + CHUNK_SIZE);
      while (entry.dc.bufferedAmount > 4 * 1024 * 1024) await new Promise(r => setTimeout(r, 30));
      entry.dc.send(chunk);
      offset += chunk.byteLength;
      updateTransferRow(rowId, offset, file.size);
    }
  }
  entry.dc.send(JSON.stringify({ kind: 'file-end', transferId }));
}

function handleIncoming(peerId, data) {
  const entry = state.peers.get(peerId);
  if (typeof data === 'string') {
    const msg = JSON.parse(data);
    if (msg.kind === 'file-start') {
      state.incoming.set(msg.transferId, { chunks: [], received: 0, name: msg.name, size: msg.size, mime: msg.mime, peerId });
      renderTransferRow(peerId, msg.transferId, msg.name, msg.size, 'in');
    } else if (msg.kind === 'file-end') {
      const t = state.incoming.get(msg.transferId);
      const blob = new Blob(t.chunks, { type: t.mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = t.name; a.click();
      toast('File received', `${t.name} from ${entry.username} — saved.`);
      state.incoming.delete(msg.transferId);
    } else if (msg.kind === 'folder-listing') {
      entry.sharedTree = msg.tree;
      renderExplorer();
    } else if (msg.kind === 'file-request') {
      fulfillFileRequest(peerId, msg.path, msg.transferId);
    }
  } else {
    // binary chunk -> append to most recent open transfer for this peer
    const active = [...state.incoming.entries()].reverse().find(([,t]) => t.peerId === peerId && t.received < t.size);
    if (!active) return;
    const [tid, t] = active;
    t.chunks.push(data);
    t.received += data.byteLength;
    updateTransferRow(tid, t.received, t.size);
  }
}

// ============================================================
// FOLDER SHARE / REMOTE EXPLORER (File System Access API — Chromium)
// ============================================================
async function chooseShareFolder() {
  if (!window.showDirectoryPicker) return toast('Not supported', 'Folder sharing needs a Chromium browser (Chrome/Edge).');
  state.sharedHandle = await window.showDirectoryPicker();
  toast('Folder ready', `"${state.sharedHandle.name}" set as your shared folder.`);
}

async function buildTree(dirHandle, path = '') {
  const tree = [];
  for await (const [name, handle] of dirHandle.entries()) {
    const p = path ? `${path}/${name}` : name;
    if (handle.kind === 'file') {
      const file = await handle.getFile();
      let thumb = null;
      if (file.type.startsWith('image/') && file.size < 5 * 1024 * 1024) {
        thumb = await new Promise(res => {
          const r = new FileReader();
          r.onload = () => res(r.result);
          r.readAsDataURL(file);
        });
      }
      tree.push({ type: 'file', name, path: p, size: file.size, mime: file.type, thumb });
    } else {
      tree.push({ type: 'dir', name, path: p, children: await buildTree(handle, p) });
    }
  }
  return tree;
}

async function grantAccess(peerId) {
  if (!state.sharedHandle) { await chooseShareFolder(); if (!state.sharedHandle) return; }
  const entry = state.peers.get(peerId);
  sendSignal(state.channel, { to: peerId, from: state.user.id, type: 'access-granted', username: state.user.username });
  const tree = await buildTree(state.sharedHandle);
  entry.dc.send(JSON.stringify({ kind: 'folder-listing', tree }));
}

async function fulfillFileRequest(peerId, path, transferId) {
  const parts = path.split('/');
  let handle = state.sharedHandle;
  for (const p of parts.slice(0, -1)) handle = await handle.getDirectoryHandle(p);
  const fileHandle = await handle.getFileHandle(parts[parts.length - 1]);
  const file = await fileHandle.getFile();
  sendFile(peerId, file); // reuse same chunked sender
}

function requestAccess(peerId) {
  sendSignal(state.channel, { to: peerId, from: state.user.id, type: 'request-access', username: state.user.username });
  toast('Request sent', 'Waiting for the other device to allow access…');
}

function promptAccessRequest(fromId, username) {
  toast('Access request', `${username} wants to view your shared folder.`, [
    { label: 'Allow', cls: 'primary', onClick: () => grantAccess(fromId) },
    { label: 'Deny', cls: 'danger', onClick: () => sendSignal(state.channel, { to: fromId, from: state.user.id, type: 'access-denied' }) },
  ]);
}

// ============================================================
// ROUTER / VIEWS
// ============================================================
function render(view) { app.innerHTML = ''; app.appendChild(view); }

function topbar() {
  const el = document.createElement('header');
  el.className = 'topbar';
  el.innerHTML = `
    <div class="brand"><span class="dot"></span> OreoPie <span class="tag">E2E · P2P</span></div>
    <div class="user-pill">${state.user ? `<b>${state.user.username}</b> <button class="btn ghost" id="logout">Logout</button>` : ''}</div>`;
  if (state.user) el.querySelector('#logout').onclick = () => location.reload();
  return el;
}

// ---- Auth view ----
function AuthView(mode = 'login') {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col"><div class="card">
      <h1>${mode === 'login' ? 'Welcome back' : 'Create your ID'}</h1>
      <p class="sub">${mode === 'login' ? 'Sign in to connect your devices.' : 'No email needed — just pick a unique ID.'}</p>
      <div class="field"><label>User ID</label><input id="username" placeholder="e.g. shadow_falcon" /></div>
      <div class="field"><label>Password</label><input id="password" type="password" placeholder="••••••••" /></div>
      <button class="btn primary" id="submit" style="width:100%">${mode === 'login' ? 'Log in' : 'Sign up'}</button>
      <div class="err hidden" id="err"></div>
      <div class="switch-link">${mode === 'login' ? `New here? <a id="switch">Create an ID</a>` : `Already have one? <a id="switch">Log in</a>`}</div>
    </div></div>`;
  wrap.appendChild(main);
  wrap.querySelector('#switch').onclick = () => render(AuthView(mode === 'login' ? 'signup' : 'login'));
  wrap.querySelector('#submit').onclick = async () => {
    const u = wrap.querySelector('#username').value.trim();
    const p = wrap.querySelector('#password').value;
    const errEl = wrap.querySelector('#err');
    errEl.classList.add('hidden');
    if (!u || !p) return;
    try {
      state.user = mode === 'login' ? await login(u, p) : await signup(u, p);
      render(ModeChoiceView());
    } catch (e) { errEl.textContent = e.message || 'Something went wrong.'; errEl.classList.remove('hidden'); }
  };
  return wrap;
}

// ---- Mode choice: Nearby vs Remote ----
function ModeChoiceView() {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col" style="max-width:560px">
      <h1 style="text-align:center; margin-bottom:20px; font-size:24px;">How do you want to connect?</h1>
      <div class="mode-grid">
        <div class="mode-card a" id="nearby"><div class="icon">◎</div><h3>Nearby</h3><p>Same network / close by. Fast local-priority transfer via a shared 6-digit code.</p></div>
        <div class="mode-card b" id="remote"><div class="icon">✦</div><h3>Remote</h3><p>Anywhere in the world. Connect using the other device's User ID + a 6-digit code.</p></div>
      </div>
    </div>`;
  wrap.appendChild(main);
  wrap.querySelector('#nearby').onclick = () => render(RoleChoiceView('nearby'));
  wrap.querySelector('#remote').onclick = () => render(RoleChoiceView('remote'));
  return wrap;
}

// ---- Role choice: Share vs Receive (applies to both Nearby and Remote) ----
function RoleChoiceView(mode) {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  const modeLabel = mode === 'nearby' ? 'Nearby' : 'Remote';
  main.innerHTML = `
    <div class="center-col" style="max-width:560px">
      <h1 style="text-align:center; margin-bottom:6px; font-size:24px;">${modeLabel} — Share or Receive?</h1>
      <p class="sub" style="text-align:center; margin-bottom:20px;">Pick one side. The other device(s) must pick the opposite.</p>
      <div class="mode-grid">
        <div class="mode-card a" id="share"><div class="icon">↑</div><h3>Share</h3><p>Generate a code. Send files to whoever enters it.</p></div>
        <div class="mode-card b" id="receive"><div class="icon">↓</div><h3>Receive</h3><p>Enter a code someone shared with you to connect.</p></div>
      </div>
      <div class="switch-link"><a id="back">← Back</a></div>
    </div>`;
  wrap.appendChild(main);
  wrap.querySelector('#back').onclick = () => render(ModeChoiceView());
  wrap.querySelector('#share').onclick = () => render(mode === 'nearby' ? NearbyShareView() : RemoteShareView());
  wrap.querySelector('#receive').onclick = () => render(mode === 'nearby' ? NearbyReceiveView() : RemoteReceiveView());
  return wrap;
}

// ---- Nearby: Share (host — generates code, waits) ----
function NearbyShareView() {
  const code = randCode();
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col"><div class="card">
      <h1>Nearby — Sharing</h1>
      <p class="sub">Give this code to up to 4 other devices. Dashboard opens automatically once someone connects.</p>
      <div class="code-display">${code}</div>
      <p class="hint" id="waitHint">Waiting for devices to join…</p>
      <div class="switch-link"><a id="back">← Back</a></div>
    </div></div>`;
  wrap.appendChild(main);
  wrap.querySelector('#back').onclick = () => { resetRoom(); render(RoleChoiceView('nearby')); };
  enterRoom(`nearby:${code}`, true);
  return wrap;
}

// ---- Nearby: Receive (join with a code, nothing generated) ----
function NearbyReceiveView() {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col"><div class="card">
      <h1>Nearby — Receiving</h1>
      <p class="sub">Enter the 6-digit code shown on the sharing device.</p>
      <div class="code-boxes" id="entry">${Array.from({length:6}).map((_,i)=>`<input maxlength="1" data-i="${i}" inputmode="numeric" />`).join('')}</div>
      <button class="btn primary" id="join" style="width:100%">Connect</button>
      <div class="err hidden" id="err"></div>
      <div class="switch-link"><a id="back">← Back</a></div>
    </div></div>`;
  wrap.appendChild(main);
  const inputs = [...wrap.querySelectorAll('#entry input')];
  inputs.forEach((inp, i) => inp.addEventListener('input', () => { if (inp.value && inputs[i+1]) inputs[i+1].focus(); }));
  wrap.querySelector('#back').onclick = () => render(RoleChoiceView('nearby'));
  wrap.querySelector('#join').onclick = () => {
    const entered = inputs.map(i => i.value).join('');
    const errEl = wrap.querySelector('#err');
    if (entered.length !== 6) { errEl.textContent = 'Enter all 6 digits.'; errEl.classList.remove('hidden'); return; }
    enterRoom(`nearby:${entered}`);
  };
  return wrap;
}

// ---- Remote: Share (host — shows User ID + code, auto-emails it) ----
function RemoteShareView() {
  const myCode = randCode();
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col"><div class="card">
      <h1>Remote — Sharing</h1>
      <p class="sub">Others connect using your User ID (<b style="color:var(--cyan)">${state.user.username}</b>) + this code.</p>
      <div class="code-display">${myCode}</div>
      <p class="hint" id="waitHint">Waiting for a device to connect…</p>

      <p class="hint" style="margin:16px 0 8px;">Optional — auto-email the code (no need to leave the site):</p>
      <div class="field"><label>Your email (sender)</label><input id="fromEmail" type="email" placeholder="you@example.com" /></div>
      <div class="field"><label>Recipient's email</label><input id="toEmail" type="email" placeholder="friend@example.com" /></div>
      <div class="err hidden" id="mailErr"></div>
      <div class="hint hidden" id="mailStatus" style="color:var(--green)"></div>
      <div class="switch-link"><a id="back">← Back</a></div>
    </div></div>`;
  wrap.appendChild(main);
  wrap.querySelector('#back').onclick = () => { resetRoom(); render(RoleChoiceView('remote')); };

  // auto-send the code once both emails look valid — no button needed
  const fromEl = wrap.querySelector('#fromEmail');
  const toEl = wrap.querySelector('#toEmail');
  const errEl = wrap.querySelector('#mailErr');
  const statusEl = wrap.querySelector('#mailStatus');
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  let sent = false, debounce;
  function tryAutoSend() {
    clearTimeout(debounce);
    if (sent) return;
    const fromEmail = fromEl.value.trim(), toEmail = toEl.value.trim();
    if (!emailRe.test(fromEmail) || !emailRe.test(toEmail)) return;
    debounce = setTimeout(async () => {
      errEl.classList.add('hidden');
      statusEl.classList.remove('hidden'); statusEl.style.color = 'var(--muted)'; statusEl.textContent = 'Sending code…';
      try {
        await sendCodeEmail(fromEmail, toEmail, myCode, state.user.username);
        sent = true;
        statusEl.style.color = 'var(--green)'; statusEl.textContent = `✓ Code sent to ${toEmail}`;
      } catch (e) {
        statusEl.classList.add('hidden');
        errEl.textContent = 'Could not auto-send — check EmailJS config in SETUP.md. Share the code manually instead.';
        errEl.classList.remove('hidden');
      }
    }, 700);
  }
  fromEl.addEventListener('input', tryAutoSend);
  toEl.addEventListener('input', tryAutoSend);

  enterRoom(`remote:${state.user.username}:${myCode}`, true);
  return wrap;
}

// ---- Remote: Receive (join by User ID + code, nothing generated) ----
function RemoteReceiveView() {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const main = document.createElement('main');
  main.innerHTML = `
    <div class="center-col"><div class="card">
      <h1>Remote — Receiving</h1>
      <p class="sub">Search for the sharer's User ID, or type it, then enter their code.</p>

      <div class="field"><label>Search a User ID</label><input id="search" placeholder="type a username…" autocomplete="off" /></div>
      <div id="results" style="margin-bottom:14px;"></div>

      <div class="field"><label>Host User ID</label><input id="hostId" placeholder="their user id" /></div>
      <div class="field"><label>6-digit code</label><input id="rcode" maxlength="6" inputmode="numeric" /></div>
      <button class="btn primary" id="join" style="width:100%">Connect</button>
      <div class="err hidden" id="err"></div>
      <div class="switch-link"><a id="back">← Back</a></div>
    </div></div>`;
  wrap.appendChild(main);

  wrap.querySelector('#back').onclick = () => render(RoleChoiceView('remote'));
  wrap.querySelector('#join').onclick = () => {
    const hostId = wrap.querySelector('#hostId').value.trim();
    const rcode = wrap.querySelector('#rcode').value.trim();
    const errEl = wrap.querySelector('#err');
    if (!hostId || rcode.length !== 6) { errEl.textContent = 'Enter the host User ID and full 6-digit code.'; errEl.classList.remove('hidden'); return; }
    enterRoom(`remote:${hostId}:${rcode}`);
  };

  // live user search
  const searchEl = wrap.querySelector('#search');
  const resultsEl = wrap.querySelector('#results');
  let debounce;
  searchEl.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(async () => {
      const matches = await searchUsers(searchEl.value.trim());
      resultsEl.innerHTML = matches.map(u => `<div class="peer-item" data-u="${u}"><div class="peer-avatar">${u.slice(0,2).toUpperCase()}</div><div class="peer-meta"><div class="pname">${u}</div></div></div>`).join('');
      resultsEl.querySelectorAll('[data-u]').forEach(row => row.onclick = () => {
        wrap.querySelector('#hostId').value = row.dataset.u;
        resultsEl.innerHTML = '';
        searchEl.value = row.dataset.u;
      });
    }, 300);
  });

  return wrap;
}

function resetRoom() {
  if (state.channel) { supabase.removeChannel(state.channel); }
  state.channel = null;
  state.roomKey = null;
}

function enterRoom(roomKey, isHostWait = false) {
  if (state.channel) return; // already in a room
  state.roomKey = roomKey;
  state.channel = joinRoom(roomKey, handleSignal);
  state.channel.on('presence', { event: 'sync' }, () => {
    const presence = state.channel.presenceState();
    Object.entries(presence).forEach(([pid, metas]) => handlePresenceJoin(pid, metas[0]?.username || pid));
  });
  state.channel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await state.channel.track({ username: state.user.username });
      if (!isHostWait) render(DashboardView());
    }
  });
  if (!isHostWait) setTimeout(() => { if (document.querySelector('.dash') === null) render(DashboardView()); }, 600);
}

// ---- Dashboard ----
let activePeerId = null, activeTab = 'transfer';
function DashboardView() {
  const wrap = document.createElement('div');
  wrap.appendChild(topbar());
  const dash = document.createElement('div');
  dash.className = 'dash';
  dash.innerHTML = `
    <aside class="side">
      <h4>Connected devices (${state.peers.size}/4)</h4>
      <div id="peerList"></div>
      <button class="btn ghost" id="shareFolder" style="width:100%; margin-top:10px;">📁 Set my shared folder</button>
      <button class="btn danger" id="disconnect" style="width:100%; margin-top:20px;">Disconnect all</button>
    </aside>
    <section class="work">
      <div class="canvas-wrap"><canvas id="graph"></canvas></div>
      <div class="tabs">
        <div class="tab active" data-t="transfer">Transfer</div>
        <div class="tab" data-t="explorer">Explore files</div>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </section>`;
  wrap.appendChild(dash);
  wrap.querySelector('#disconnect').onclick = () => location.reload();
  wrap.querySelector('#shareFolder').onclick = chooseShareFolder;
  wrap.querySelectorAll('.tab').forEach(t => t.onclick = () => {
    wrap.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active'); activeTab = t.dataset.t; renderPanel();
  });
  window.__dashWrap = wrap;
  setTimeout(() => { initGraph(); renderPeerList(); renderPanel(); }, 0);
  return wrap;
}

function renderPeerList() {
  const wrap = window.__dashWrap; if (!wrap) return;
  const listEl = wrap.querySelector('#peerList'); if (!listEl) return;
  listEl.innerHTML = '';
  if (state.peers.size === 0) listEl.innerHTML = `<div class="empty-state">Waiting for other devices to join…</div>`;
  state.peers.forEach((p, id) => {
    const row = document.createElement('div');
    row.className = 'peer-item' + (activePeerId === id ? ' active' : '');
    row.innerHTML = `<div class="peer-avatar">${p.username.slice(0,2).toUpperCase()}</div>
      <div class="peer-meta"><div class="pname">${p.username}</div><div class="pstatus ${p.status}">${p.status}</div></div>`;
    row.onclick = () => { activePeerId = id; renderPeerList(); renderPanel(); };
    listEl.appendChild(row);
  });
  drawGraph();
}

function renderPanel() {
  const wrap = window.__dashWrap; if (!wrap) return;
  const body = wrap.querySelector('#panelBody'); if (!body) return;
  if (activeTab === 'transfer') {
    body.innerHTML = `
      <div class="drop-zone" id="dz"><div class="big">Drop files here</div><div class="small">or click to browse — sent full quality, chunked over an encrypted channel</div></div>
      <div id="transferList"></div>`;
    const dz = body.querySelector('#dz');
    dz.onclick = () => { const inp = document.createElement('input'); inp.type = 'file'; inp.multiple = true; inp.onchange = () => sendToActive([...inp.files]); inp.click(); };
    ['dragover','dragleave','drop'].forEach(evt => dz.addEventListener(evt, e => { e.preventDefault(); dz.classList.toggle('over', evt === 'dragover'); }));
    dz.addEventListener('drop', e => sendToActive([...e.dataTransfer.files]));
  } else {
    renderExplorer();
  }
}

function sendToActive(files) {
  if (!activePeerId) return toast('Pick a device', 'Select a connected device from the list first.');
  files.forEach(f => sendFile(activePeerId, f));
}

function renderTransferRow(peerId, transferId, name, size, dir) {
  const wrap = window.__dashWrap; if (!wrap) return transferId;
  const list = wrap.querySelector('#transferList'); if (!list) return transferId;
  const row = document.createElement('div');
  row.className = 'file-row'; row.id = `t-${transferId}`;
  row.innerHTML = `<div class="file-thumb">${dir === 'out' ? '↑' : '↓'}</div>
    <div class="file-info"><div class="fname">${name}</div><div class="fmeta">0 / ${fmtBytes(size)}</div>
    <div class="progress-bar"><div class="fill"></div></div></div>`;
  list.prepend(row);
  return transferId;
}
function updateTransferRow(transferId, done, total) {
  const row = document.getElementById(`t-${transferId}`); if (!row) return;
  row.querySelector('.fmeta').textContent = `${fmtBytes(done)} / ${fmtBytes(total)}`;
  row.querySelector('.fill').style.width = Math.min(100, (done/total)*100) + '%';
}

function renderExplorer() {
  const wrap = window.__dashWrap; if (!wrap) return;
  const body = wrap.querySelector('#panelBody'); if (!body) return;
  if (!activePeerId) { body.innerHTML = `<div class="empty-state">Select a device to explore its shared folder.</div>`; return; }
  const p = state.peers.get(activePeerId);
  if (!p.sharedTree) {
    body.innerHTML = `<div class="empty-state">No access yet.<br><br><button class="btn primary" id="reqBtn">Request folder access</button></div>`;
    body.querySelector('#reqBtn').onclick = () => requestAccess(activePeerId);
    return;
  }
  body.innerHTML = '<div id="tree"></div>';
  renderTreeNodes(body.querySelector('#tree'), p.sharedTree, activePeerId);
}
function renderTreeNodes(container, nodes, peerId) {
  nodes.forEach(n => {
    const row = document.createElement('div');
    row.className = 'file-row';
    if (n.type === 'file') {
      row.innerHTML = `<div class="file-thumb">${n.thumb ? `<img src="${n.thumb}"/>` : '📄'}</div>
        <div class="file-info"><div class="fname">${n.name}</div><div class="fmeta">${fmtBytes(n.size)}</div></div>
        <button class="btn ghost" style="padding:6px 10px;font-size:12px;">Copy to my device</button>`;
      row.querySelector('button').onclick = () => {
        const entry = state.peers.get(peerId);
        const transferId = crypto.randomUUID();
        entry.dc.send(JSON.stringify({ kind: 'file-request', path: n.path, transferId }));
        toast('Requested', `Pulling "${n.name}"…`);
      };
    } else {
      row.innerHTML = `<div class="file-thumb">📁</div><div class="file-info"><div class="fname">${n.name}/</div><div class="fmeta">${n.children.length} items</div></div>`;
    }
    container.appendChild(row);
  });
}

// ---- Signature visual: live mesh graph ----
let graphCtx, graphAnim;
function initGraph() {
  const c = document.getElementById('graph'); if (!c) return;
  c.width = c.clientWidth * 2; c.height = c.clientHeight * 2;
  graphCtx = c.getContext('2d'); graphCtx.scale(2,2);
  drawGraph();
}
function drawGraph() {
  const c = document.getElementById('graph'); if (!c || !graphCtx) return;
  const w = c.clientWidth, h = c.clientHeight;
  graphCtx.clearRect(0,0,w,h);
  const me = { x: w/2, y: h/2 };
  const ids = [...state.peers.keys()];
  const t = Date.now()/700;
  graphCtx.strokeStyle = 'rgba(139,107,255,.5)';
  ids.forEach((id, i) => {
    const angle = (i / Math.max(ids.length,1)) * Math.PI * 2;
    const r = 80;
    const px = me.x + Math.cos(angle) * r, py = me.y + Math.sin(angle) * r;
    const p = state.peers.get(id);
    const pulse = p.status === 'connected' ? (Math.sin(t + i) + 1) / 2 : 0.15;
    graphCtx.globalAlpha = 0.3 + pulse * 0.5;
    graphCtx.beginPath(); graphCtx.moveTo(me.x, me.y); graphCtx.lineTo(px, py); graphCtx.stroke();
    graphCtx.globalAlpha = 1;
    graphCtx.fillStyle = p.status === 'connected' ? '#00ffa3' : '#ffcc66';
    graphCtx.beginPath(); graphCtx.arc(px, py, 10, 0, 7); graphCtx.fill();
    graphCtx.fillStyle = '#e7ecf5'; graphCtx.font = '10px monospace'; graphCtx.textAlign = 'center';
    graphCtx.fillText(p.username.slice(0,8), px, py + 24);
  });
  graphCtx.fillStyle = '#00e5ff';
  graphCtx.beginPath(); graphCtx.arc(me.x, me.y, 14, 0, 7); graphCtx.fill();
  graphCtx.fillStyle = '#04060a'; graphCtx.font = 'bold 10px monospace'; graphCtx.textAlign = 'center';
  graphCtx.fillText('YOU', me.x, me.y + 4);
  cancelAnimationFrame(graphAnim);
  graphAnim = requestAnimationFrame(drawGraph);
}
